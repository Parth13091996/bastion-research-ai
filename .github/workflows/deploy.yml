name: Vercel CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1 # Pin a specific version for stability

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm" # Cache pnpm dependencies for faster builds

      - name: Verify pnpm installation
        run: |
          echo "Checking pnpm installation..."
          pnpm --version || { echo "pnpm not found"; exit 1; } # Fail explicitly if pnpm is not found
          echo "pnpm installed successfully"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile # Respect pnpm-lock.yaml

      - name: Build project
        run: pnpm run build # Assumes Turborepo build script for web and server

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"